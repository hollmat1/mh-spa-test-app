<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MSAL PKCE SPA (Multi-/Single-tenant)</title>
    <style>
      body{font-family:Segoe UI,Arial;margin:2rem}
      button{margin:.3rem}
      pre{background:#f5f5f5;padding:1rem}
    </style>
  </head>
  <body>
    <h1>MSAL PKCE SPA</h1>
    <p id="status">Not signed in</p>
    <div>
      <button id="signin">Sign in</button>
      <button id="signout" disabled>Sign out</button>
    </div>
    <h3>Account</h3>
    <pre id="account">(none)</pre>

    <div>
      <button id="acquire" disabled>Get token (silent -> popup)</button>
      <button id="callApi" disabled>Call protected API</button>
    </div>

    <h3>Protected API settings</h3>
    <div id="protectedSettings" style="display:none">
      <div>
        <label>API URL: <input id="apiUrl" type="text" style="width:60%" placeholder="https://example.com/api/endpoint"></label>
      </div>
      <div>
        <label>Scopes (space or comma separated): <input id="apiScopes" type="text" style="width:60%" placeholder="openid profile User.Read"></label>
      </div>
      <div>
        <label>HTTP Verb: 
          <select id="apiVerb">
            <option>GET</option>
            <option>POST</option>
            <option>PUT</option>
            <option>PATCH</option>
            <option>DELETE</option>
            <option>HEAD</option>
          </select>
        </label>
      </div>
      <div>
        <label>Payload (JSON or plain text):</label>
        <textarea id="apiPayload" rows="6" style="width:100%" placeholder='{"key":"value"}'></textarea>
      </div>
      <div>
        <label>Headers (one per line, <code>Key: Value</code>):</label>
        <textarea id="apiHeaders" rows="4" style="width:100%" placeholder="Accept: application/json\nX-Custom-Header: foo"></textarea>
      </div>
    </div>

    <h3>Token / API response</h3>
    <pre id="result">(none)</pre>
    <div>
      <a id="tokenLink" href="#" target="_blank" rel="noopener" style="display:none">Open token in jwt.ms</a>
    </div>
    <h4>Decoded token (if JWT)</h4>
    <pre id="decoded">(none)</pre>
    <h4>Raw token / diagnostics</h4>
    <textarea id="rawToken" rows="3" style="width:100%" placeholder="raw token will appear here"></textarea>
    <div>
      <button id="copyToken">Copy token</button>
      <span id="tokenInfo" style="margin-left:1rem">(no token)</span>
    </div>

    <!-- prefer a local copy of msal-browser at /libs/msal-browser.min.js, fallback to CDN -->
    <script>
      (function(){
        function load(src, onload, onerror){
          var s = document.createElement('script');
          s.src = src; s.async = false; s.onload = onload; s.onerror = onerror;
          document.head.appendChild(s);
        }
        load('libs/msal-browser.min.js', function(){console.log('Loaded local msal-browser');}, function(){
          load('https://unpkg.com/@azure/msal-browser@2.46.1/dist/msal-browser.min.js', function(){console.log('Loaded msal-browser from CDN');}, function(){console.error('Failed to load msal-browser');});
        });
      })();
    </script>
    <script src="authConfig.js"></script>
    <script src="app.js"></script>
  </body>
</html>
